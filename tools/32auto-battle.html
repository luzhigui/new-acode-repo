<!-- auto-battle.html - 光明顶对战 5v5 自动批量测试页面（合并记录+预览修复） -->
<!-- 预估行数: 260, 发送时间: 20260621 10:00, 版本: V2.1.0 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光明顶 5v5 自动批量测试</title>
    <style>
        body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 12px; font-size: 13px; }
        h2 { color: #ffd700; text-align: center; }
        .main-layout { display: flex; gap: 12px; flex-direction: column; }
        .config { background: #2a2a4e; padding: 12px; border-radius: 8px; }
        .config label { display: block; margin-top: 8px; color: #ffd700; font-weight: bold; }
        select, input, button { padding: 8px; border-radius: 4px; border: none; font-size: 14px; }
        button { background: #ffd700; color: #1a1a2e; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .report { margin-top: 20px; background: #2a2a4e; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
        #status { text-align: center; margin: 10px 0; }
        .buff-checkboxes { display: flex; flex-wrap: wrap; gap: 8px; }
        .buff-checkboxes label { color: #eee; font-weight: normal; display: flex; align-items: center; gap: 4px; }
        .buff-checkboxes input { margin: 0; }
        .history { margin-top: 20px; background: #1a1a3e; padding: 8px; border-radius: 4px; max-height: 200px; overflow-y: auto; }
        .history-item { border-bottom: 1px solid #333; padding: 4px 0; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .history-item span { flex: 1; }
        .history-item button { width: auto; padding: 2px 6px; font-size: 10px; margin: 0 0 0 8px; }
        .preview-grid { font-family: monospace; white-space: pre; line-height: 1.4; margin-top: 8px; background: #1a1a2e; padding: 8px; border-radius: 4px; }
        .grid-container { display: flex; gap: 20px; }
    </style>
</head>
<body>
    <h2>⚔️ 光明顶 5v5 自动批量测试</h2>
    <div class="main-layout">
        <div class="config">
            <label for="stageSelect">选择关卡：</label>
            <select id="stageSelect">
                <option value="1">第1关</option>
                <option value="2">第2关</option>
                <option value="3">第3关</option>
                <option value="4">第4关</option>
                <option value="5">第5关</option>
                <option value="6">第6关</option>
            </select>
            <label for="roundsInput">测试场次：</label>
            <input type="number" id="roundsInput" value="300" min="1" max="1000" step="50">
            <label>海克斯偏好（出现时优先选择）：</label>
            <div id="buffCheckboxes" class="buff-checkboxes">正在加载...</div>
            <button id="runBtn">▶ 开始测试</button>
        </div>
        <div class="grid-container">
            <div class="config" style="flex:1;">
                <span style="color:#ffd700;">📊 当前关卡敌人站位预览</span>
                <div id="previewGrid" class="preview-grid">加载中...</div>
            </div>
        </div>
    </div>
    <div id="status"></div>
    <div id="report" class="report"></div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="color:#ffd700;">📋 历史记录</h3>
        <button id="copyAllHistoryBtn" style="width:auto; padding:4px 12px; font-size:12px;">一键复制</button>
        <button id="clearHistoryBtn" style="width:auto; padding:4px 12px; font-size:12px;">清空记录</button>
    </div>
    <div id="history" class="history"></div>

    <script type="module">
        import { runAutoBattle } from '../tests/27auto-battle-utils.js';
        import { CONFIG } from '../core/01config-5v5-test.js';

        const buffCheckboxesDiv = document.getElementById('buffCheckboxes');
        const allBuffs = Object.entries(CONFIG.BUFFS);
        buffCheckboxesDiv.innerHTML = allBuffs.map(([key, buff]) => 
            `<label><input type="checkbox" value="${key}"> ${buff.icon} ${buff.name}</label>`
        ).join('');

        function updatePreview(stage) {
            const previewDiv = document.getElementById('previewGrid');
            const template = CONFIG.ENEMY_POS_TEMPLATES ? CONFIG.ENEMY_POS_TEMPLATES[stage] : null;
            const eliteList = CONFIG.ELITE_POOL && CONFIG.ELITE_POOL[stage] ? CONFIG.ELITE_POOL[stage] : [];
            
            if (!template) {
                previewDiv.textContent = '无模板，纯随机站位';
                return;
            }

            let grid = Array(9).fill('·');
            for (let [role, poses] of Object.entries(template)) {
                if (role === 'random') continue;
                for (let p of poses) {
                    const roleChar = role === '防战' ? '防' : (role === '战士' ? '战' : (role === '远程' ? '远' : '飞'));
                    if (p >= 1 && p <= 9) grid[p-1] = roleChar;
                }
            }
            for (let elite of eliteList) {
                const pos = elite.pos;
                if (pos && grid[pos-1] !== '·') {
                    grid[pos-1] += '*';
                } else if (pos) {
                    grid[pos-1] = '精*';
                }
            }

            const names = Object.keys(CONFIG.ENEMY_POS_TEMPLATES);
            previewDiv.textContent = 
                `模板职业：${Object.entries(template).map(([k,v])=>`${k}(${v.join(',')})`).join(', ')}\n精英怪：${eliteList.map(e=>`${e.name}(${e.role})`).join(', ') || '无'}\n\n` +
                `┌───┬───┬───┐\n│ ${grid[0]} │ ${grid[1]} │ ${grid[2]} │  1 2 3\n├───┼───┼───┤\n│ ${grid[3]} │ ${grid[4]} │ ${grid[5]} │  4 5 6\n├───┼───┼───┤\n│ ${grid[6]} │ ${grid[7]} │ ${grid[8]} │  7 8 9\n└───┴───┴───┘\n* = 精英`;
        }

        function loadHistory() {
            const historyDiv = document.getElementById('history');
            const history = JSON.parse(localStorage.getItem('ming_auto_test_history') || '[]');
            historyDiv.innerHTML = history.map((item, idx) => 
                `<div class="history-item">
                    <span>${item.time} | 第${item.stage}关 | ${item.rounds}场 | 明${item.wins.ally}胜 六${item.wins.enemy}胜 平${item.wins.draw} | 偏好：${item.prefs || '无'}</span>
                    <button class="copy-item" data-idx="${idx}">复制</button>
                </div>`
            ).join('');
            document.querySelectorAll('.copy-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    const item = history[idx];
                    const text = `${item.time} | 第${item.stage}关 | ${item.rounds}场 | 明教胜：${item.wins.ally} 六大派胜：${item.wins.enemy} 平局：${item.wins.draw} | 偏好：${item.prefs || '无'}`;
                    navigator.clipboard.writeText(text).then(() => alert('已复制'));
                });
            });
        }

        document.getElementById('copyAllHistoryBtn').addEventListener('click', () => {
            const history = JSON.parse(localStorage.getItem('ming_auto_test_history') || '[]');
            if (history.length === 0) return alert('暂无记录');
            const text = history.map(item => 
                `${item.time} | 第${item.stage}关 | ${item.rounds}场 | 明教胜：${item.wins.ally} 六大派胜：${item.wins.enemy} 平局：${item.wins.draw} | 偏好：${item.prefs || '无'}`
            ).join('\n');
            navigator.clipboard.writeText(text).then(() => alert('已复制全部记录'));
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', ()=>{
            localStorage.removeItem('ming_auto_test_history');
            loadHistory();
        });

        document.getElementById('stageSelect').addEventListener('change', function() {
            updatePreview(parseInt(this.value));
        });

        document.getElementById('runBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            const report = document.getElementById('report');
            const runBtn = document.getElementById('runBtn');
            
            const stage = parseInt(document.getElementById('stageSelect').value);
            const rounds = parseInt(document.getElementById('roundsInput').value) || 300;
            const preferredBuffs = Array.from(
                document.querySelectorAll('#buffCheckboxes input:checked')
            ).map(cb => cb.value);

            runBtn.disabled = true;
            status.textContent = `正在测试 (${rounds}场)...`;
            report.textContent = '';

            try {
                const wins = await runAutoBattle(rounds, (current, total) => {
                    status.textContent = `进度：${current} / ${total}`;
                }, stage, preferredBuffs);

                const resultText = `关卡：${stage}\n场次：${rounds}\n偏好海克斯：${preferredBuffs.length > 0 ? preferredBuffs.join(', ') : '无'}\n\n明教胜：${wins.ally} 场\n六大派胜：${wins.enemy} 场\n平局：${wins.draw} 场`;
                report.textContent = resultText;
                status.textContent = '✅ 测试完成！';

                const now = new Date();
                const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
                const history = JSON.parse(localStorage.getItem('ming_auto_test_history') || '[]');
                const newPrefs = preferredBuffs.join(',');
                
                if (history.length > 0) {
                    const last = history[0];
                    if (last.stage === stage && last.prefs === newPrefs) {
                        last.rounds += rounds;
                        last.wins.ally += wins.ally;
                        last.wins.enemy += wins.enemy;
                        last.wins.draw += wins.draw;
                        last.time = timeStr; 
                    } else {
                        history.unshift({ time: timeStr, stage, rounds, wins, prefs: newPrefs });
                        if (history.length > 20) history.pop();
                    }
                } else {
                    history.push({ time: timeStr, stage, rounds, wins, prefs: newPrefs });
                }
                localStorage.setItem('ming_auto_test_history', JSON.stringify(history));
                loadHistory();
            } catch (e) {
                status.textContent = '❌ 测试异常！';
                report.textContent = '错误详情：' + (e.stack || e.message);
            } finally {
                runBtn.disabled = false;
            }
        });

        updatePreview(1);
        loadHistory();
    </script>
</body>
</html>
