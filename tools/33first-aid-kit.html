<!-- first-aid-kit.html - 光明顶项目 · 开发急救包 V1.0 -->
<!-- 用法：Live Server 打开，一键扫描并修复经典低级 Bug -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 光明顶 · 开发急救包</title>
    <style>
        body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 16px; font-size: 13px; }
        h2 { color: #ffd700; text-align: center; margin-bottom: 12px; }
        .control-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-scan { background: #ffd700; color: #1a1a2e; flex: 1; }
        .btn-scan:hover { background: #ffed4a; }
        .btn-copy-all { background: #3a3a6e; color: #eee; }
        .btn-copy-all:hover { background: #4a4a8e; }
        .stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; }
        .stat { background: #2a2a4e; padding: 10px 18px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 10px; color: #aaa; }
        .issue-card { background: #2a2a4e; border-left: 4px solid #f44336; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
        .issue-card.fixed { border-left-color: #4caf50; }
        .issue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .issue-title { font-weight: bold; color: #ff9800; }
        .issue-card.fixed .issue-title { color: #4caf50; }
        .issue-file { color: #888; font-size: 11px; }
        .issue-desc { font-size: 11px; color: #ccc; margin-bottom: 8px; }
        .issue-code { background: #111; padding: 8px; border-radius: 4px; font-size: 11px; white-space: pre-wrap; max-height: 120px; overflow-y: auto; color: #ddd; }
        .fix-btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .fix-btn.fix { background: #f44336; color: white; }
        .fix-btn.fix:hover { background: #d32f2f; }
        .fix-btn.copy { background: #4caf50; color: white; }
        .fix-btn.copy:hover { background: #388e3c; }
        #log { margin-top: 16px; color: #888; font-size: 11px; min-height: 20px; }
    </style>
</head>
<body>
    <h2>⚡ 光明顶 · 开发急救包 V1.0</h2>
    
    <div class="control-bar">
        <button class="btn btn-scan" id="btnScan">🔍 开始扫描项目</button>
        <button class="btn btn-copy-all" id="btnCopyAll" disabled>📋 复制所有修复</button>
    </div>

    <div class="stats">
        <div class="stat"><div class="stat-value" id="totalFiles">-</div><div class="stat-label">扫描文件</div></div>
        <div class="stat"><div class="stat-value" id="totalIssues">-</div><div class="stat-label">发现问题</div></div>
        <div class="stat"><div class="stat-value" id="totalFixed">-</div><div class="stat-label">可自动修复</div></div>
    </div>

    <div id="issuesContainer"></div>
    <div id="log">点击“开始扫描项目”以检查代码中的经典低级错误。</div>

    <script>
        // 需要扫描的核心文件列表
        const TARGET_FILES = [
            { name: '01config-5v5-test.js', path: '../core/01config-5v5-test.js' },
            { name: '02unit.js', path: '../core/02unit.js' },
            { name: '03battle-utils.js', path: '../core/03battle-utils.js' },
            { name: '04buff-system.js', path: '../core/04buff-system.js' },
            { name: '06battle-engine-core.js', path: '../core/06battle-engine-core.js' },
            { name: '10player-core.js', path: '../player/10player-core.js' },
            { name: '13main-5v5-test.js', path: '../ui/13main-5v5-test.js' },
            { name: '14ui-render-5v5-test.js', path: '../ui/14ui-render-5v5-test.js' },
            { name: '17fx-crash-5v5-test.js', path: '../fx/17fx-crash-5v5-test.js' },
            { name: '20fx-dodge-bullet.js', path: '../fx/20fx-dodge-bullet.js' },
            { name: '23elite-skills.js', path: '../modules/23elite-skills.js' },
            { name: '27auto-battle-utils.js', path: '../tests/27auto-battle-utils.js' },
            { name: '28audio-manager.js', path: '../modules/28audio-manager.js' }
        ];

        // 诊断规则定义
        const RULES = [
            {
                id: 'pos-negative-one',
                title: '残留的阵亡站位污染',
                desc: '检测到 u.pos = -1 等代码，这会导致“语义污染”。阵亡应只通过 alive/isDead 控制。',
                severity: 'high',
                scan: (code) => {
                    const lines = code.split('\n');
                    const matches = [];
                    lines.forEach((line, idx) => {
                        if (line.includes('pos = -1') || line.includes('pos=-1')) {
                            matches.push({ line: idx + 1, content: line.trim() });
                        }
                    });
                    return matches;
                },
                fix: (code) => {
                    return code.replace(/\.pos\s*=\s*-1/g, '._isDead = true');
                }
            },
            {
                id: 'duplicate-available',
                title: 'available 变量重复声明',
                desc: '在 doInitBattle 中，let available 被意外声明了两次，会导致初始化崩溃。',
                severity: 'critical',
                scan: (code) => {
                    const matches = [];
                    const regex = /let\s+available\s*=/g;
                    let match;
                    while ((match = regex.exec(code)) !== null) {
                        const lineNum = code.substring(0, match.index).split('\n').length;
                        matches.push({ line: lineNum, content: match[0] });
                    }
                    return matches.length >= 2 ? matches : [];
                },
                fix: (code) => {
                    // 只保留第一次声明，后续改为 remainingSlots
                    let count = 0;
                    return code.replace(/let\s+available\s*=/g, (m) => {
                        count++;
                        if (count === 1) return m;
                        return 'let remainingSlots =';
                    });
                }
            },
            {
                id: 'clone-missing-attribute',
                title: 'clone 方法遗漏新状态属性',
                desc: '02unit.js 的 clone() 中可能缺少对新加属性（如 _xuanmingPoison）的复制，导致回合切换后状态丢失。',
                severity: 'high',
                scan: (code) => {
                    const knownAttrs = ['_acted', '_flash', '_blocked', '_isDead', '_resting', '_flyMode', '_hotBloodCount', '_doubleStriked', '_zhangSwitched', 'buffAtkBonus', 'buffDefBonus', 'buffDodgeBonus', 'buffHpBonus', '_baseMaxHp', '_xuanmingPoison'];
                    const missing = [];
                    knownAttrs.forEach(attr => {
                        if (!code.includes(`c.${attr}`)) {
                            missing.push(attr);
                        }
                    });
                    return missing.length > 0 ? [{ line: 0, content: `缺少: ${missing.join(', ')}` }] : [];
                },
                fix: null // 需要手动处理，提供建议
            },
            {
                id: 'large-function',
                title: '超大函数警告',
                desc: '检测到行数超过 200 行的超大函数，建议拆分以降低维护成本。',
                severity: 'info',
                scan: (code) => {
                    const lines = code.split('\n');
                    const matches = [];
                    let funcStart = -1;
                    let braceDepth = 0;
                    lines.forEach((line, idx) => {
                        if (line.includes('function ') && line.includes('(') && funcStart === -1) {
                            funcStart = idx;
                            braceDepth = 0;
                        }
                        if (funcStart !== -1) {
                            braceDepth += (line.match(/\{/g) || []).length;
                            braceDepth -= (line.match(/\}/g) || []).length;
                            if (braceDepth === 0 && idx - funcStart > 200) {
                                matches.push({ line: funcStart + 1, content: `约 ${idx - funcStart} 行` });
                                funcStart = -1;
                            } else if (braceDepth === 0) {
                                funcStart = -1;
                            }
                        }
                    });
                    return matches;
                },
                fix: null
            },
            {
                id: 'getelementbyid-no-null-check',
                title: 'getElementById 缺少空值检查',
                desc: '检测到 document.getElementById 调用后未进行空值检查，可能导致运行时崩溃。',
                severity: 'medium',
                scan: (code) => {
                    const lines = code.split('\n');
                    const matches = [];
                    const regex = /(\w+)\s*=\s*document\.getElementById\(['"]([^'"]+)['"]\)/g;
                    let match;
                    while ((match = regex.exec(code)) !== null) {
                        const varName = match[1];
                        const lineNum = code.substring(0, match.index).split('\n').length;
                        const line = lines[lineNum - 1] || '';
                        const nextLine = lines[lineNum] || '';
                        if (line.includes('?.') || line.includes('if (') || nextLine.includes('if (')) continue;
                        matches.push({ line: lineNum, content: line.trim() });
                    }
                    return matches.slice(0, 5);
                },
                fix: null
            },
            {
                id: 'var-instead-of-let-const',
                title: '使用 var 而非 let/const',
                desc: '检测到使用 var 声明变量，建议改用 let 或 const。',
                severity: 'low',
                scan: (code) => {
                    const lines = code.split('\n');
                    const matches = [];
                    lines.forEach((line, idx) => {
                        if (/\bvar\s+\w/.test(line) && !line.includes('//') && !line.includes('*')) {
                            matches.push({ line: idx + 1, content: line.trim() });
                        }
                    });
                    return matches.slice(0, 10);
                },
                fix: null
            }
        ];

        const issuesContainer = document.getElementById('issuesContainer');
        const logDiv = document.getElementById('log');
        const btnScan = document.getElementById('btnScan');
        const btnCopyAll = document.getElementById('btnCopyAll');

        let allIssues = [];
        let fixedContents = {};

        async function scanProject() {
            btnScan.disabled = true;
            btnScan.textContent = '⏳ 扫描中...';
            issuesContainer.innerHTML = '';
            logDiv.textContent = '正在读取文件...';
            allIssues = [];
            fixedContents = {};

            let totalFiles = 0;
            let totalIssues = 0;
            let totalFixable = 0;

            for (const fileInfo of TARGET_FILES) {
                try {
                    const response = await fetch(fileInfo.path);
                    if (!response.ok) {
                        logDiv.textContent = `⚠️ 跳过 ${fileInfo.name}：无法访问（请确认通过 Live Server 打开）`;
                        continue;
                    }
                    const code = await response.text();
                    totalFiles++;

                    RULES.forEach(rule => {
                        const matches = rule.scan(code);
                        if (matches.length > 0) {
                            totalIssues += matches.length;
                            const isFixable = rule.fix !== null;
                            if (isFixable) totalFixable++;

                            matches.forEach(match => {
                                allIssues.push({
                                    filename: fileInfo.name,
                                    rule,
                                    line: match.line,
                                    content: match.content,
                                    isFixable
                                });
                            });

                            // 如果可以修复，生成修复后的代码
                            if (isFixable) {
                                fixedContents[fileInfo.name] = rule.fix(code);
                            }
                        }
                    });
                } catch (err) {
                    logDiv.textContent = `❌ 读取 ${fileInfo.name} 失败：${err.message}`;
                }
            }

            // 渲染结果
            renderIssues();
            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalIssues').textContent = totalIssues;
            document.getElementById('totalFixed').textContent = totalFixable;
            btnCopyAll.disabled = totalFixable === 0;
            btnScan.disabled = false;
            btnScan.textContent = '🔍 重新扫描';
            logDiv.textContent = `✅ 扫描完成：${totalFiles} 个文件，发现 ${totalIssues} 个问题（其中 ${totalFixable} 个可自动修复）`;
        }

        function renderIssues() {
            issuesContainer.innerHTML = '';
            allIssues.forEach((issue, index) => {
                const card = document.createElement('div');
                card.className = 'issue-card';
                card.id = `issue-${index}`;
                card.innerHTML = `
                    <div class="issue-header">
                        <span class="issue-title">⚠️ ${issue.rule.title}</span>
                        <span class="issue-file">📄 ${issue.filename}${issue.line > 0 ? ` : 第${issue.line}行` : ''}</span>
                    </div>
                    <div class="issue-desc">${issue.rule.desc}</div>
                    <div class="issue-code">${escapeHtml(issue.content)}</div>
                    ${issue.isFixable ? `<button class="fix-btn fix" data-index="${index}">🔧 一键修复</button>` : `<span style="color:#ff9800;font-size:11px;">⚠️ 需手动处理（无自动修复规则）</span>`}
                `;
                issuesContainer.appendChild(card);
            });

            // 绑定修复按钮
            document.querySelectorAll('.fix-btn.fix').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const index = parseInt(e.target.dataset.index);
                    const issue = allIssues[index];
                    const fixedCode = fixedContents[issue.filename];
                    if (fixedCode) {
                        try {
                            await navigator.clipboard.writeText(fixedCode);
                            const card = document.getElementById(`issue-${index}`);
                            card.classList.add('fixed');
                            e.target.textContent = '✅ 已复制修复代码';
                            e.target.className = 'fix-btn copy';
                            logDiv.textContent = `✅ 已复制 ${issue.filename} 的修复版本，请粘贴覆盖原文件。`;
                        } catch (err) {
                            logDiv.textContent = '❌ 复制失败，请手动复制修复代码。';
                        }
                    }
                });
            });
        }

        btnCopyAll.addEventListener('click', async () => {
            const allFixed = Object.entries(fixedContents).map(([file, code]) => `// ===== ${file} (修复版) =====\n${code}`).join('\n\n');
            if (allFixed) {
                try {
                    await navigator.clipboard.writeText(allFixed);
                    logDiv.textContent = '✅ 已复制所有修复代码，请逐个粘贴覆盖原文件。';
                } catch (err) {
                    logDiv.textContent = '❌ 复制失败，请重试。';
                }
            }
        });

        btnScan.addEventListener('click', scanProject);

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
