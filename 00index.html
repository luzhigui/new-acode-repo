<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚔️ 光明顶 · 开发控制台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a2e; font-family: 'Segoe UI', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; color: #eee;
        }
        .container {
            width: 100%; max-width: 600px;
            background: #16213e; border-radius: 20px; padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd700; text-align: center; margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { color: #8b7355; text-align: center; margin-bottom: 30px; font-size: 0.9rem; }
        .section { margin-bottom: 30px; }
        .section-title {
            color: #aaa; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;
            padding-left: 10px; border-left: 3px solid #ffd700;
        }
        .btn-grid { display: grid; gap: 10px; }
        .big-btn {
            display: block; width: 100%; padding: 15px 20px;
            border: none; border-radius: 10px; font-size: 1rem; font-weight: bold;
            color: #1a1a2e; cursor: pointer; transition: 0.2s;
            text-align: center; text-decoration: none;
        }
        .btn-play { background: linear-gradient(135deg, #ffd700, #ffaa00); }
        .btn-play:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-tool { background: #3a3a6e; color: #fff; border: 1px solid #555; }
        .btn-tool:hover { background: #4a4a8e; border-color: #ffd700; transform: translateY(-2px); }
        .btn-music {
            background: #2a2a4e; color: #ffd700; border: 2px solid #ffd700;
            font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-music:hover { background: #3a3a6e; }
        .btn-music.muted { border-color: #888; color: #888; }
        .dev-toolbox-grid { display: none; }
        .dev-toolbox-grid.expanded { display: grid; }
        .toggle-section { cursor: pointer; user-select: none; }
        .toggle-section:hover { color: #ffd700; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 光明顶</h1>
        <div class="subtitle">V3.1 开发集成控制台</div>
        <div style="text-align:center;color:#4caf50;font-size:0.8rem;margin-top:-20px;margin-bottom:25px;">✅ 2026-06-25 优化体检等待逻辑 / 清空历史记录弹窗修复 / 下掉环境诊断页签</div>

        <!-- 核心游戏 -->
        <div class="section">
            <div class="section-title">🎮 核心游戏</div>
            <button class="big-btn btn-play" id="btnGame">⚔️ 开始游戏 (5v5)</button>
        </div>

        <!-- 开发工具箱 -->
        <div class="section">
            <div class="section-title toggle-section" id="devToolboxToggle" onclick="document.getElementById('devToolboxGrid').classList.toggle('expanded'); this.textContent = document.getElementById('devToolboxGrid').classList.contains('expanded') ? '🛠️ 开发工具箱 ▾' : '🛠️ 开发工具箱 ▸';" style="display:flex;justify-content:space-between;">🛠️ 开发工具箱 ▸</div>
            <div class="btn-grid dev-toolbox-grid" id="devToolboxGrid">
                <button class="big-btn btn-tool" id="btnCopier">📋 函数替换器</button>
                <button class="big-btn btn-tool" id="btnFileCopier">📄 文件复制器</button>
                <button class="big-btn btn-tool" id="btnTest">🧪 测试与诊断</button>
                <button class="big-btn btn-tool" id="btnAutoBattle">📊 自动批量测试</button>
                <button class="big-btn btn-tool" id="btnFirstAid">⚡ 开发急救包</button>
                <button class="big-btn btn-tool" id="btnFangCalc">🛡️ 防战系数计算器</button>
                <button class="big-btn btn-tool" id="btnCodex">📜 开发协同标准</button>
            </div>
        </div>

        <!-- 独立音乐控制 -->
        <div class="section">
            <div class="section-title">🎵 背景音乐</div>
            <button class="big-btn btn-music" id="btnBGM">🎵 背景音乐：播放中</button>
        </div>

        <div class="footer">光明顶 · 开发控制台 V3.1</div>
    </div>

    <script>
        // ==================== 页面跳转 ====================
        document.getElementById('btnGame').addEventListener('click', () => {
            window.open('mode-5v5-test.html', '_blank');
        });
        document.getElementById('btnCopier').addEventListener('click', () => {
            window.open('tools/31function-copier.html', '_blank');
        });
        document.getElementById('btnFileCopier').addEventListener('click', () => {
            window.open('tools/34file-copier.html', '_blank');
        });
        document.getElementById('btnTest').addEventListener('click', () => {
            window.open('tools/30test-runner.html', '_blank');
        });
        document.getElementById('btnAutoBattle').addEventListener('click', () => {
            window.open('tools/32auto-battle.html', '_blank');
        });
        document.getElementById('btnFirstAid').addEventListener('click', () => {
            window.open('tools/33first-aid-kit.html', '_blank');
        });
        document.getElementById('btnFangCalc').addEventListener('click', () => {
            window.open('tools/35fang-calc.html', '_blank');
        });
        document.getElementById('btnCodex').addEventListener('click', () => {
            window.open('tools/26codex-v2.1.js', '_blank');
        });

        // ==================== 独立背景音乐 ====================
        let bgm = null;
        let bgmPlaying = false;

        function initBGM() {
            try {
                bgm = new Audio('assets/xinai.m4a');
                bgm.loop = true;
                bgm.volume = 0.6;
            } catch (e) {
                bgm = null;
            }
        }

        document.getElementById('btnBGM').addEventListener('click', () => {
            if (!bgm) initBGM();
            if (!bgm) return;

            const btn = document.getElementById('btnBGM');
            if (bgmPlaying) {
                bgm.pause();
                bgmPlaying = false;
                btn.textContent = '🔇 背景音乐：已暂停';
                btn.classList.add('muted');
            } else {
                bgm.play().catch(() => {});
                bgmPlaying = true;
                btn.textContent = '🎵 背景音乐：播放中';
                btn.classList.remove('muted');
            }
        });

        // 初始化
        initBGM();
    </script>
</body>
</html>
