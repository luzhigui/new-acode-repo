<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚔️ 光明顶5v5 · 开发集成入口 V4.0.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a2e; font-family: 'Segoe UI', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; color: #eee;
        }
        .container {
            width: 100%; max-width: 600px;
            background: #16213e; border-radius: 20px; padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #ffd700; text-align: center; margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { color: #8b7355; text-align: center; margin-bottom: 30px; font-size: 0.9rem; }
        .section { margin-bottom: 30px; }
        .section-title {
            color: #aaa; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;
            padding-left: 10px; border-left: 3px solid #ffd700;
        }
        .btn-grid { display: grid; gap: 10px; }
        .big-btn {
            display: block; width: 100%; padding: 15px 20px;
            border: none; border-radius: 10px; font-size: 1rem; font-weight: bold;
            color: #1a1a2e; cursor: pointer; transition: 0.2s;
            text-align: center; text-decoration: none;
        }
        .btn-play { background: linear-gradient(135deg, #ffd700, #ffaa00); }
        .btn-play:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-health { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .btn-health:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-tool { background: #3a3a6e; color: #fff; border: 1px solid #555; }
        .btn-tool:hover { background: #4a4a8e; border-color: #ffd700; transform: translateY(-2px); }
        .btn-music {
            background: #2a2a4e; color: #ffd700; border: 2px solid #ffd700;
            font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-music:hover { background: #3a3a6e; }
        .btn-music.muted { border-color: #888; color: #888; }
        .dev-toolbox-grid { display: none; }
        .dev-toolbox-grid.expanded { display: grid; }
        .toggle-section { cursor: pointer; user-select: none; }
        .toggle-section:hover { color: #ffd700; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 光明顶5v5</h1>
        <div class="subtitle">V4.0.0 开发集成入口</div>

        <!-- 主入口 -->
        <div class="section">
            <div class="section-title">🎮 主入口</div>
            <div class="btn-grid">
                <button class="big-btn btn-play" id="btnGame">⚔️ 主游戏</button>
                <button class="big-btn btn-health" id="btnHealthCheck">🩺 全面体检</button>
                <button class="big-btn btn-tool" id="btnTools">🧰 工具箱</button>
            </div>
        </div>

        <!-- 开发准则 -->
        <div class="section">
            <div class="section-title toggle-section" id="devGuideToggle" style="display:flex;justify-content:space-between;">📖 开发准则 ▸</div>
            <div class="btn-grid dev-toolbox-grid" id="devGuideGrid">
                <button class="big-btn btn-tool" id="btnReadme">📖 README 项目大纲</button>
                <button class="big-btn btn-tool" id="btnChangelog">📋 CHANGELOG 变更履历</button>
                <button class="big-btn btn-tool" id="btnTestRunner">📋 Test Runner 迭代变更日志</button>
            </div>
        </div>

        <!-- 独立音乐控制 -->
        <div class="section">
            <div class="section-title">🎵 背景音乐</div>
            <button class="big-btn btn-music muted" id="btnBGM">🔇 背景音乐：已暂停</button>
        </div>

        <div class="footer">光明顶5v5 · 开发集成入口 V4.0.0</div>
    </div>

    <script>
        // ==================== 页面跳转 ====================
        document.getElementById('btnGame').addEventListener('click', () => {
            window.open('mode-5v5-test.html', '_blank');
        });
        document.getElementById('btnHealthCheck').addEventListener('click', () => {
            window.open('tests/30test-runner.html', '_blank');
        });
        document.getElementById('btnTools').addEventListener('click', () => {
            window.open('tools/31-toolkit.html', '_blank');
        });
        document.getElementById('btnReadme').addEventListener('click', () => {
            window.open('README.md', '_blank');
        });
        document.getElementById('btnChangelog').addEventListener('click', () => {
            window.open('CHANGELOG.md', '_blank');
        });
        document.getElementById('btnTestRunner').addEventListener('click', () => {
            window.open('Test Runnerlogo.md', '_blank');
        });

        // ==================== 开发准则折叠 ====================
        document.getElementById('devGuideToggle').addEventListener('click', function() {
            const grid = document.getElementById('devGuideGrid');
            const expanded = grid.classList.toggle('expanded');
            this.innerHTML = expanded ? '📖 开发准则 ▾' : '📖 开发准则 ▸';
        });

        // ==================== 独立背景音乐 ====================
        let bgm = null;
        let bgmPlaying = false;

        function initBGM() {
            try {
                bgm = new Audio('assets/sfx_xinai.mp3');
                bgm.loop = true;
                bgm.volume = 0.6;
            } catch (e) {
                bgm = null;
            }
        }

        document.getElementById('btnBGM').addEventListener('click', () => {
            if (!bgm) {
                try {
                    bgm = new Audio('assets/sfx_xinai.mp3');
                    bgm.loop = true;
                    bgm.volume = 0.6;
                } catch (e) {
                    bgm = null;
                }
            }
            if (!bgm) return;

            const btn = document.getElementById('btnBGM');
            if (bgmPlaying) {
                bgm.pause();
                bgmPlaying = false;
                btn.textContent = '🔇 背景音乐：已暂停';
                btn.classList.add('muted');
            } else {
                bgm.play().catch(() => {});
                bgmPlaying = true;
                btn.textContent = '🎵 背景音乐：播放中';
                btn.classList.remove('muted');
            }
        });

    </script>
</body>
</html>
