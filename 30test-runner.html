<!-- 30test-runner.html - 光明顶 5v5 测试与全身体检中心 V4.1 -->
<!-- 预估字节数: 25000, 发送时间: 20260625 17:30, 版本: V4.1.0 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>光明顶 5v5 测试与诊断 V4.1</title>
    <style>
        body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 12px; font-size: 13px; margin: 0; }
        h2 { color: #ffd700; text-align: center; margin: 8px 0; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab-btn { flex: 1; padding: 10px; background: #2a2a4e; border: 2px solid #444; border-radius: 8px 8px 0 0; color: #aaa; cursor: pointer; font-size: 13px; font-weight: bold; text-align: center; }
        .tab-btn.active { background: #1a1a2e; border-bottom-color: #1a1a2e; color: #ffd700; border-color: #ffd700 #ffd700 #1a1a2e #ffd700; }
        .tab-panel { display: none; } .tab-panel.active { display: block; }
        button { display: block; width: 100%; padding: 12px; margin: 16px 0; background: #ffd700; color: #1a1a2e; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .result { margin: 6px 0; padding: 4px 8px; border-radius: 4px; }
        .pass-line { color: #4caf50; } .fail-line { color: #f44336; background: rgba(244,67,54,0.15); }
        .summary { margin-top: 16px; padding: 10px; background: rgba(255,215,0,0.1); border: 1px solid #ffd700; border-radius: 6px; text-align: center; font-weight: bold; }
        .auto-status { margin: 8px 0; color: #ff9800; font-size: 12px; text-align: center; min-height: 20px; }
        .stage-result { margin: 8px 0; padding: 8px; background: #111; border-radius: 6px; font-size: 12px; }
        .stage-result .stage-name { color: #ffd700; font-weight: bold; }
        #autoIframe { display: none; width: 100%; height: 500px; border: 2px solid #444; border-radius: 8px; margin-top: 12px; }
        .progress-container { display: none; margin: 12px 0; }
        .progress-bar-wrap { background: #2a2a4e; border-radius: 8px; height: 20px; overflow: hidden; border: 1px solid #444; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #ffd700); width: 0%; transition: width 0.3s ease; border-radius: 8px; }
        .progress-text { text-align: center; font-size: 11px; color: #aaa; margin-top: 4px; }
        .stage-checkboxes, .group-checkboxes { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
        .stage-checkboxes label, .group-checkboxes label { display: flex; align-items: center; gap: 4px; background: #2a2a4e; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .quiz-panel { display: none; margin-top: 12px; background: #1a1a2e; border: 1px solid #444; border-radius: 8px; padding: 12px; }
        .quiz-question { font-size: 14px; margin-bottom: 8px; color: #ffd700; }
        .quiz-options { display: flex; flex-wrap: wrap; gap: 8px; }
        .quiz-option { background: #2a2a4e; border: 1px solid #444; border-radius: 4px; padding: 8px 16px; cursor: pointer; color: #ccc; }
        .quiz-option:hover { border-color: #ffd700; } .quiz-option.correct { background: #4caf50; color: white; } .quiz-option.wrong { background: #f44336; color: white; }
        .quiz-feedback { margin-top: 8px; font-size: 12px; } .quiz-score { margin-top: 8px; font-weight: bold; color: #ffd700; }
        .feedback-area { display: none; margin-top: 12px; }
        .feedback-area textarea { width: 100%; height: 50px; background: #111; color: #ccc; border: 1px solid #444; border-radius: 4px; padding: 4px; font-size: 12px; }
        .history-panel { margin-top: 16px; background: #111; border-radius: 8px; padding: 8px; max-height: 200px; overflow-y: auto; display: none; }
        .history-item { font-size: 11px; color: #aaa; border-bottom: 1px solid #333; padding: 4px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<h2>⚔️ 光明顶 5v5 测试与诊断 V4.1</h2>
<div class="tabs">
    <button class="tab-btn active" data-tab="core-tests">🧪 核心测试</button>
    <button class="tab-btn" data-tab="env-diag">🔍 环境诊断</button>
    <button class="tab-btn" data-tab="health-check">💚 全面体检</button>
</div>
<div class="tab-panel active" id="core-tests">
    <button id="runBtn">▶ 运行核心测试</button>
    <div id="results"></div>
    <div id="coreSummary" class="summary" style="display:none;"></div>
</div>
<div class="tab-panel" id="env-diag"><div id="diagnosisContainer"></div></div>
<div class="tab-panel" id="health-check">
    <div class="stage-checkboxes" id="stageCheckboxes">
        <label><input type="checkbox" value="1" checked> 1关</label><label><input type="checkbox" value="2" checked> 2关</label>
        <label><input type="checkbox" value="3" checked> 3关</label><label><input type="checkbox" value="4" checked> 4关</label>
        <label><input type="checkbox" value="5" checked> 5关</label><label><input type="checkbox" value="6" checked> 6关</label>
    </div>
    <div class="group-checkboxes" id="groupCheckboxes"></div>
    <button id="runAutoCheckBtn">🤖 开始全面体检</button>
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">初始化...</div>
    </div>
    <div class="quiz-panel" id="quizPanel">
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-feedback" id="quizFeedback"></div>
        <div class="quiz-score" id="quizScore">得分：0</div>
        <button id="toggleFeedback" style="margin-top:8px; padding:6px 12px; font-size:12px;">📝 快速反馈</button>
        <div class="feedback-area" id="feedbackArea">
            <textarea id="feedbackInput" placeholder="记个Bug、反馈题目、想到什么写什么..."></textarea>
            <button id="submitFeedback" style="margin-top:4px; padding:6px 12px; font-size:12px;">保存</button>
            <div id="feedbackHistory" style="color:#aaa; font-size:10px; margin-top:4px; max-height:80px; overflow-y:auto;"></div>
        </div>
    </div>
    <button id="copySummaryBtn" style="display:none; margin-top:8px;">📋 复制汇总</button>
    <button id="copyFullBtn" style="display:none;">📋 复制完整报告</button>
    <div id="autoStatus" class="auto-status">选择关卡和规则组，点击按钮开始</div>
    <div id="autoReport"></div>
    <div class="history-panel" id="historyPanel"></div>
    <iframe id="autoIframe" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
</div>
<script type="module">
import { runTests } from './25unit-tests.js';
import { runHealthCheck } from './37health-core.js';
import { loadQuizBank, saveCustomQuiz } from './35quiz-bank.js';

// 标签页切换
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
}));

// 核心测试
document.getElementById('runBtn').addEventListener('click', async ()=>{
    const resDiv=document.getElementById('results'), sum=document.getElementById('coreSummary');
    resDiv.innerHTML=''; sum.style.display='none';
    const log=(m)=>{ const d=document.createElement('div'); d.className='result pass-line'; d.textContent=m; resDiv.appendChild(d); };
    const err=(m)=>{ const d=document.createElement('div'); d.className='result fail-line'; d.textContent=m; resDiv.appendChild(d); };
    try{
        const r=runTests(log,err);
        sum.style.display='block';
        sum.textContent=`📋 通过${r.passed}，失败${r.failed}`+(r.failed===0?' 🎉':'');
    }catch(e){err('❌ '+e.message);}
});

// 环境诊断（精简版，保持原有逻辑不变）
const diagCont=document.getElementById('diagnosisContainer');
const diagItems=[
    {g:'🎵', n:'AudioManager', t:()=>!!window.AudioManager, f:'确认28audio'},
    {g:'⚔️', n:'固定单位=3', t:()=>{var c=window._getPlayerContext?.(); return c?.UI?.allyTeam?.filter(u=>u.fixed).length===3;}, f:'检查doInitBattle'},
    {g:'⚔️', n:'明教pos非-1', t:()=>{var c=window._getPlayerContext?.(); return c?.UI?.allyTeam?.every(u=>u.pos!==-1);}, f:'改为null'},
    {g:'⚔️', n:'六大派pos合法', t:()=>{var c=window._getPlayerContext?.(); return c?.UI?.enemyTeam?.every(u=>u.pos>=1&&u.pos<=9);}, f:'检查兜底'},
    {g:'📦', n:'错误面板', t:()=>!!document.getElementById('errorCapturePanel'), f:'24未加载'},
    {g:'📦', n:'06核心', t:()=>typeof window.VER_CORE!=='undefined', f:'检查06'},
    {g:'📦', n:'10播放器', t:()=>typeof window.VER_PLAYER_CORE!=='undefined', f:'检查10'},
];
var groups={}; diagItems.forEach(i=>{if(!groups[i.g]) groups[i.g]=[]; groups[i.g].push(i);});
for(var gn in groups){
    var gd=document.createElement('div'); gd.innerHTML='<div class="group-title">'+gn+'</div><div class="diagnosis-grid"></div>';
    var grid=gd.querySelector('.diagnosis-grid');
    groups[gn].forEach((it,idx)=>{
        var card=document.createElement('div'); card.className='diag-card pending'; card.id='diag-'+gn+'-'+idx;
        card.innerHTML='<div class="diag-name">'+it.n+'</div><div class="diag-status"><span class="pending-text">⏳</span></div><div class="diag-fix">🔧 '+it.f+'</div><button class="diag-btn run" data-g="'+gn+'" data-i="'+idx+'">▶</button>';
        grid.appendChild(card);
    });
    diagCont.appendChild(gd);
}
diagCont.addEventListener('click', async (e)=>{
    if(!e.target.classList.contains('run')) return;
    var btn=e.target, gn=btn.dataset.g, idx=parseInt(btn.dataset.i), item=groups[gn][idx];
    var card=document.getElementById('diag-'+gn+'-'+idx), span=card.querySelector('.diag-status span');
    btn.textContent='⏳'; btn.disabled=true; card.classList.remove('pass','fail'); card.classList.add('pending');
    try{
        var r=item.t.constructor.name==='AsyncFunction'?await item.t():item.t();
        card.classList.remove('pending'); btn.textContent='🔄'; btn.classList.remove('run'); btn.classList.add('retest');
        if(r===true){card.classList.add('pass'); span.className='pass-text'; span.textContent='✅';}
        else if(r===null){card.classList.add('pending'); span.className='pending-text'; span.textContent='⚠️';}
        else{card.classList.add('fail'); span.className='fail-text'; span.textContent='❌';}
    }catch(err){card.classList.add('fail'); span.className='fail-text'; span.textContent='❌';}
    finally{btn.disabled=false;}
});

// ==================== 全面体检 UI 绑定 ====================
const runBtn = document.getElementById('runAutoCheckBtn');
const statusEl = document.getElementById('autoStatus');
const reportEl = document.getElementById('autoReport');
const copySumBtn = document.getElementById('copySummaryBtn');
const copyFullBtn = document.getElementById('copyFullBtn');
const progCont = document.getElementById('progressContainer');
const progFill = document.getElementById('progressFill');
const progText = document.getElementById('progressText');
const stageCbs = document.getElementById('stageCheckboxes');
const groupCbs = document.getElementById('groupCheckboxes');
const quizPanel = document.getElementById('quizPanel');
const quizQ = document.getElementById('quizQuestion');
const quizOpts = document.getElementById('quizOptions');
const quizFeed = document.getElementById('quizFeedback');
const quizScoreEl = document.getElementById('quizScore');
const feedbackArea = document.getElementById('feedbackArea');
const feedbackInput = document.getElementById('feedbackInput');
const feedbackHistory = document.getElementById('feedbackHistory');
const historyPanel = document.getElementById('historyPanel');
const iframe = document.getElementById('autoIframe');

// 初始化规则组复选框
const allGroups = ['🚀 启动与加载','🎨 九宫格基础','❤️ 血条与属性','✨ Buff 系统','🎭 状态样式','🎵 音效','🎬 特效','👹 精英','🔗 数据','⚙️ 引擎','📋 日志','📍 站位'];
groupCbs.innerHTML = allGroups.map(g => `<label><input type="checkbox" value="${g}" checked> ${g.split(' ')[1]||g}</label>`).join('');

// 答题功能（已补全）
let quizActive = false;
let quizScore = 0;
const quizBank = loadQuizBank();

function showQuiz() {
    if (!quizActive || !quizBank.length) return;
    const q = quizBank[Math.floor(Math.random() * quizBank.length)];
    quizQ.textContent = '❓ ' + q.q;
    quizOpts.innerHTML = '';
    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
            if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
            const allOpts = quizOpts.querySelectorAll('.quiz-option');
            if (i === q.a) {
                btn.classList.add('correct');
                quizScore += 10;
                quizFeed.textContent = '✅ ' + q.e;
            } else {
                btn.classList.add('wrong');
                quizFeed.textContent = '❌ ' + q.e;
                quizScore = Math.max(0, quizScore - 5);
            }
            quizScoreEl.textContent = '得分：' + quizScore;
            allOpts.forEach(o => o.style.pointerEvents = 'none');
            setTimeout(() => { if (quizActive) showQuiz(); }, 2500);
        });
        quizOpts.appendChild(btn);
    });
    quizFeed.textContent = '';
}

function startQuiz() {
    quizScore = 0;
    quizScoreEl.textContent = '得分：0';
    quizActive = true;
    quizPanel.style.display = 'block';
    showQuiz();
}

function stopQuiz() {
    quizActive = false;
    quizPanel.style.display = 'none';
}

// 快速反馈
document.getElementById('toggleFeedback').addEventListener('click', ()=>{
    feedbackArea.style.display = feedbackArea.style.display === 'block' ? 'none' : 'block';
    loadFeedbackHistory();
});
document.getElementById('submitFeedback').addEventListener('click', ()=>{
    const text = feedbackInput.value.trim();
    if (!text) return;
    const list = JSON.parse(localStorage.getItem('ming_feedback') || '[]');
    list.unshift({ time: new Date().toLocaleString(), text });
    if (list.length > 50) list.pop();
    localStorage.setItem('ming_feedback', JSON.stringify(list));
    feedbackInput.value = '';
    loadFeedbackHistory();
});
function loadFeedbackHistory() {
    const list = JSON.parse(localStorage.getItem('ming_feedback') || '[]');
    feedbackHistory.innerHTML = list.length ? list.map((f, i) => `<div>${f.time} ${f.text} <button data-fi="${i}" style="font-size:10px;padding:0 4px;">复制</button></div>`).join('') : '暂无反馈记录';
    feedbackHistory.querySelectorAll('button').forEach(b => b.addEventListener('click', (e) => {
        const i = parseInt(e.target.dataset.fi);
        const item = JSON.parse(localStorage.getItem('ming_feedback') || '[]')[i];
        if (item) navigator.clipboard.writeText(item.time + ' ' + item.text).then(() => statusEl.textContent = '📋 已复制');
    }));
}

// 历史记录
function loadHistory(){
    const hist = JSON.parse(localStorage.getItem('ming_test_history') || '[]');
    historyPanel.innerHTML = hist.length ? '<div style="color:#ffd700;font-weight:bold;">📜 历史记录</div>' + hist.map((h,i) => `<div class="history-item"><span>${h.time} 通过${h.pass} 失败${h.fail}</span><button data-i="${i}" style="font-size:10px;padding:2px 6px;">复制</button></div>`).join('') : '';
    historyPanel.style.display = hist.length ? 'block' : 'none';
    historyPanel.querySelectorAll('button').forEach(b => b.addEventListener('click', (e) => {
        const i = parseInt(e.target.dataset.i);
        const h = JSON.parse(localStorage.getItem('ming_test_history') || '[]')[i];
        if (h) navigator.clipboard.writeText(h.text).then(() => statusEl.textContent = '📋 已复制');
    }));
}
loadHistory();

// 开始体检（包含答题）
runBtn.addEventListener('click', () => {
    startQuiz();
    const config = {
        iframe, statusEl, reportEl, copySumBtn, copyFullBtn, runBtn,
        progCont, progFill, progText, stageCbs, groupCbs
    };
    runHealthCheck(config).then(() => {
        stopQuiz();
        loadHistory();
    });
});
</script>
</body>
</html>
